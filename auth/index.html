<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everfast | Access</title>
    <script>
  (function() {
    var canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    var ctx = canvas.getContext('2d');

    var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    ctx.fillStyle = dark ? '#020617' : '#ffffff';
    ctx.fillRect(0, 0, 64, 64);

    ctx.fillStyle = dark ? '#ffffff' : '#111827';
    ctx.font = 'bold 34px Inter, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('EF', 32, 33);

    var link = document.createElement('link');
    link.rel = 'icon';
    link.href = canvas.toDataURL('image/png');
    document.head.appendChild(link);

    // Update if user switches OS theme mid-session
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
      ctx.fillStyle = e.matches ? '#020617' : '#ffffff';
      ctx.fillRect(0, 0, 64, 64);
      ctx.fillStyle = e.matches ? '#ffffff' : '#111827';
      ctx.fillText('EF', 32, 33);
      link.href = canvas.toDataURL('image/png');
    });
  })();
</script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center text-white antialiased bg-[#020617]">

    <div class="w-full max-w-md mx-4">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/" class="text-2xl font-black tracking-tighter text-white">
                EVER<span class="text-blue-500">FAST</span>
            </a>
        </div>

        <!-- Card -->
        <div class="bg-slate-900/60 backdrop-blur border border-white/5 rounded-3xl p-10 shadow-2xl">
            <!-- Tabs -->
            <div class="flex bg-slate-800/60 p-1 rounded-2xl mb-8">
                <button id="login-tab" onclick="switchMode('login')"
                    class="flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-slate-700 text-white shadow">
                    Sign In
                </button>
                <button id="signup-tab" onclick="switchMode('register')"
                    class="flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-400">
                    Create Account
                </button>
            </div>

            <form id="auth-form" class="space-y-5">
                <div>
                    <label class="block text-[0.7rem] font-bold uppercase tracking-wider text-slate-400 mb-2">Email</label>
                    <input type="email" id="email" placeholder="you@example.com" required
                        class="w-full bg-slate-800/60 border border-white/8 px-4 py-4 rounded-xl text-white placeholder-slate-500 outline-none focus:border-blue-500 transition text-sm">
                </div>
                <div>
                    <label class="block text-[0.7rem] font-bold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                    <input type="password" id="password" placeholder="Min. 8 characters" required
                        class="w-full bg-slate-800/60 border border-white/8 px-4 py-4 rounded-xl text-white placeholder-slate-500 outline-none focus:border-blue-500 transition text-sm">
                </div>
                <button type="submit" id="btn-submit"
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-xl transition text-sm mt-2">
                    Access Vault
                </button>
            </form>

            <div id="msg" class="mt-5 text-sm min-h-[1.25rem] text-center"></div>
        </div>

        <p class="text-center text-slate-600 text-xs mt-6">
            © <a href="https://projects.jwork.ru" class="hover:text-slate-400 transition">Jwork</a> Infrastructure Group
        </p>
    </div>

    <script>
        const API_BASE = "https://sparkling-math-0017.wgattr14.workers.dev";
        if (localStorage.getItem('jwork_token')) window.location.replace('/dash');
        let currentMode = 'login';

        function switchMode(mode) {
            currentMode = mode;
            const loginTab = document.getElementById('login-tab');
            const signupTab = document.getElementById('signup-tab');
            const btn = document.getElementById('btn-submit');

            if (mode === 'login') {
                loginTab.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-slate-700 text-white shadow';
                signupTab.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-400';
                btn.textContent = 'Access Vault';
            } else {
                signupTab.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all bg-slate-700 text-white shadow';
                loginTab.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-400';
                btn.textContent = 'Create Account';
            }
            document.getElementById('msg').textContent = '';
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('msg');
            const btn = document.getElementById('btn-submit');

            msgDiv.className = 'mt-5 text-sm min-h-[1.25rem] text-center text-slate-400';
            msgDiv.textContent = 'Processing…';
            btn.disabled = true;

            const body = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
            };

            try {
                const res = await fetch(`${API_BASE}/auth/${currentMode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                const data = await res.json();

                if (data.ok) {
                    msgDiv.className = 'mt-5 text-sm min-h-[1.25rem] text-center text-green-400';
                    msgDiv.textContent = 'Success! Redirecting…';
                    localStorage.setItem('jwork_token', data.token);
                    setTimeout(() => window.location.href = '/dash/', 800);
                } else {
                    msgDiv.className = 'mt-5 text-sm min-h-[1.25rem] text-center text-red-400';
                    msgDiv.textContent = data.error || 'Something went wrong.';
                    btn.disabled = false;
                }
            } catch {
                msgDiv.className = 'mt-5 text-sm min-h-[1.25rem] text-center text-red-400';
                msgDiv.textContent = 'Could not reach the server. Please try again.';
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
