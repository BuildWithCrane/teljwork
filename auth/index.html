<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jwork | Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505; --surface: #0f0f0f; --border: rgba(255, 255, 255, 0.08);
            --primary: #5200ff; --text: #ffffff; --text-muted: #b8b8b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-container {
            background: var(--surface); border: 1px solid var(--border);
            width: 100%; max-width: 420px; padding: 40px; border-radius: 32px;
            text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 30px; display: inline-block; color: var(--text); text-decoration: none; }
        .logo i { color: var(--primary); margin-right: 8px; }

        .tabs { display: flex; background: #161616; padding: 5px; border-radius: 14px; margin-bottom: 28px; }
        .tab { flex: 1; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text-muted); transition: 0.3s; }
        .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        .input-group { text-align: left; margin-bottom: 18px; }
        .input-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .input-group input {
            width: 100%; background: #161616; border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: white; font-size: 1rem; transition: 0.2s;
        }
        .input-group input:focus { outline: none; border-color: var(--primary); }

        .btn-submit {
            width: 100%; background: var(--primary); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }
        
        #msg { margin-top: 20px; font-size: 0.85rem; min-height: 1.2rem; }
        .error { color: #ff4b4b; }
        .success { color: #00ff85; }
    </style>
</head>
<body>

    <div class="auth-container">
        <a href="/" class="logo"><i class="fas fa-cube"></i> JWORK</a>
        
        <div class="tabs">
            <div id="login-tab" class="tab active" onclick="switchMode('login')">Login</div>
            <div id="signup-tab" class="tab" onclick="switchMode('register')">Sign Up</div>
        </div>

        <form id="auth-form">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="vlad_vault" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div id="referral-area" class="input-group" style="display: none;">
                <label>Referral Code (Optional)</label>
                <input type="text" id="referral" placeholder="GIFT-50GB">
            </div>
            <button type="submit" class="btn-submit" id="btn-text">Access Vault</button>
        </form>

        <div id="msg"></div>
    </div>

    <script>
        // Use your actual *.workers.dev URL here
        const API_BASE = "https://sparkling-math-0017.wgattr14.workers.dev";
        let currentMode = 'login';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('login-tab').classList.toggle('active', mode === 'login');
            document.getElementById('signup-tab').classList.toggle('active', mode === 'register');
            document.getElementById('referral-area').style.display = mode === 'register' ? 'block' : 'none';
            document.getElementById('btn-text').innerText = mode === 'login' ? 'Access Vault' : 'Create Account';
            document.getElementById('msg').innerText = "";
        }

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('msg');
            const btn = document.getElementById('btn-text');
            
            msgDiv.className = "";
            msgDiv.innerText = "Processing...";
            btn.disabled = true;

            const body = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            if (currentMode === 'register') body.referral_code = document.getElementById('referral').value;

            try {
                const res = await fetch(`${API_BASE}/auth/${currentMode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                const data = await res.json();

                if (data.ok) {
                    msgDiv.className = "success";
                    msgDiv.innerText = "Success! Redirecting...";
                    localStorage.setItem('jwork_token', data.token);
                    setTimeout(() => window.location.href = './dash', 800);
                } else {
                    msgDiv.className = "error";
                    msgDiv.innerText = data.error;
                    btn.disabled = false;
                }
            } catch (err) {
                msgDiv.className = "error";
                msgDiv.innerText = "Worker connection failed.";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
