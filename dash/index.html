<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jwork | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #050505; --surface: #0f0f0f; --surface-accent: #161616;
            --border: rgba(255, 255, 255, 0.08); --primary: #5200ff;
            --accent: #00f0ff; --text-main: #ffffff; --text-muted: #b8b8b8;
            --success: #00ff85; --error: #ff4b4b; --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Sidebar */
        .sidebar { width: var(--sidebar-width); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px; }
        .logo { font-weight: 800; font-size: 1.2rem; color: var(--text-main); text-decoration: none; display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
        .logo i { color: var(--primary); }
        .nav-group { margin-bottom: 32px; }
        .nav-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: block; }
        .nav-link { display: flex; align-items: center; gap: 12px; color: var(--text-muted); text-decoration: none; padding: 12px; border-radius: 12px; font-size: 0.9rem; font-weight: 600; transition: 0.2s; margin-bottom: 4px; }
        .nav-link:hover, .nav-link.active { background: var(--surface-accent); color: var(--text-main); }
        .nav-link.active i { color: var(--primary); }

        /* Main Content */
        .main-content { flex: 1; overflow-y: auto; padding: 40px; position: relative; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .user-badge { display: flex; align-items: center; gap: 12px; background: var(--surface); padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border); font-size: 0.85rem; }
        
        /* Grid & Cards */
        .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        
        /* Storage Ring */
        .storage-hero { text-align: center; padding: 20px 0; }
        .storage-ring { 
            width: 160px; height: 160px; border-radius: 50%; 
            margin: 0 auto 20px; display: flex; align-items: center; 
            justify-content: center; flex-direction: column;
            background: radial-gradient(closest-side, var(--surface) 79%, transparent 80% 100%),
                        conic-gradient(var(--primary) 0%, var(--surface-accent) 0%);
        }

        /* File Table */
        .file-table { width: 100%; border-collapse: collapse; }
        .file-table th { text-align: left; font-size: 0.75rem; color: var(--text-muted); padding: 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; }
        .file-table td { padding: 16px 12px; font-size: 0.9rem; border-bottom: 1px solid var(--border); }
        .file-icon { color: var(--primary); margin-right: 10px; }
        .action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.2s; padding: 5px; }
        .action-btn:hover { color: var(--primary); }
        .action-btn.delete:hover { color: var(--error); }

        /* Custom Notification Toast */
        #toast {
            position: fixed; bottom: 30px; right: 30px; 
            padding: 16px 24px; border-radius: 16px; 
            background: var(--surface-accent); border: 1px solid var(--border);
            color: white; font-weight: 600; display: flex; align-items: center; gap: 12px;
            transform: translateY(150%); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        #toast.show { transform: translateY(0); }
        .toast-icon { width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        .btn-primary { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="/" class="logo"><i class="fas fa-cube"></i> JWORK</a>
        <div class="nav-group">
            <span class="nav-label">General</span>
            <a href="#" class="nav-link active"><i class="fas fa-th-large"></i> Overview</a>
            <a href="#" class="nav-link"><i class="fas fa-folder"></i> All Files</a>
        </div>
        <div class="nav-group">
            <span class="nav-label">System</span>
            <a href="#" class="nav-link"><i class="fas fa-share-nodes"></i> Referrals</a>
            <a href="#" class="nav-link"><i class="fas fa-cog"></i> Settings</a>
        </div>
        <div style="margin-top: auto;">
            <div onclick="logout()" class="nav-link" style="color: var(--error); cursor: pointer;"><i class="fas fa-power-off"></i> Logout</div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <h1>Files</h1>
            <div class="user-badge">
                <span class="mono" id="user-display">Loading...</span>
            </div>
        </div>

        <div class="dash-grid">
            <div class="card">
                <div class="card-header">
                    <span class="mono" style="font-weight: 800;">VAULT CONTENTS</span>
                    <button class="btn-primary" onclick="triggerUpload()"><i class="fas fa-upload"></i> Upload</button>
                </div>
                <table class="file-table">
                    <thead><tr><th>Name</th><th>Size</th><th>Actions</th></tr></thead>
                    <tbody id="file-list"></tbody>
                </table>
            </div>

            <div class="dash-right">
                <div class="card" style="margin-bottom: 24px;">
                    <div class="storage-hero">
                        <div class="storage-ring" id="ring-element">
                            <span class="mono" id="percent-label" style="font-size: 1.8rem; font-weight: 800;">0%</span>
                        </div>
                        <p class="mono" id="raw-storage-label" style="font-size: 1rem; color: var(--text-muted);">0B / 0B</p>
                    </div>
                </div>
                
                <div class="card">
                    <span class="nav-label">Referral Link</span>
                    <div class="mono" id="ref-link" style="background: var(--bg); padding: 12px; border-radius: 8px; font-size: 0.8rem; margin: 10px 0; border: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis;">...</div>
                    <p style="font-size: 0.75rem; color: var(--text-muted);">Share this to gain 5GB per sign-up.</p>
                </div>
            </div>
        </div>
    </main>

    <div id="toast">
        <div class="toast-icon" id="toast-type"></div>
        <span id="toast-msg"></span>
    </div>

    <script>
        const WORKER_URL = "https://sparkling-math-0017.wgattr14.workers.dev";
        const token = localStorage.getItem('jwork_token');

        if (!token) window.location.href = 'index.html';

        function showNotify(msg, type = 'info') {
            const t = document.getElementById('toast');
            const icon = document.getElementById('toast-type');
            document.getElementById('toast-msg').innerText = msg;
            
            icon.style.background = type === 'error' ? 'var(--error)' : 'var(--primary)';
            icon.innerHTML = type === 'error' ? '<i class="fas fa-times"></i>' : '<i class="fas fa-check"></i>';
            
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        async function refreshDash() {
            try {
                const headers = { 'Authorization': 'Bearer ' + token };
                const [uRes, fRes] = await Promise.all([
                    fetch(`${WORKER_URL}/auth/me`, { headers }),
                    fetch(`${WORKER_URL}/files`, { headers })
                ]);

                const user = await uRes.json();
                const filesData = await fRes.json();

                if (!user.ok) return logout();

                document.getElementById('user-display').innerText = user.username;
                document.getElementById('ref-link').innerText = `${window.location.origin}/auth?ref=${user.referral_code}`;
                
                const percent = Math.round((user.storage_used / user.storage_cap) * 100);
                document.getElementById('percent-label').innerText = percent + '%';
                document.getElementById('ring-element').style.background = `radial-gradient(closest-side, var(--surface) 79%, transparent 80% 100%), conic-gradient(var(--primary) ${percent}%, var(--surface-accent) 0%)`;
                document.getElementById('raw-storage-label').innerText = `${(user.storage_used/1024**3).toFixed(2)}GB / ${(user.storage_cap/1024**3).toFixed(2)}GB`;

                const list = document.getElementById('file-list');
                list.innerHTML = filesData.files.map(f => `
                    <tr>
                        <td><i class="far fa-file-alt file-icon"></i> ${f.name}</td>
                        <td class="mono" style="font-size: 0.8rem;">${(f.size/1024/1024).toFixed(1)} MB</td>
                        <td>
                            <button class="action-btn" onclick="downloadFile('${f.file_id}', '${f.name}')"><i class="fas fa-cloud-download-alt"></i></button>
                            <button class="action-btn delete" onclick="deleteFile('${f.id}')"><i class="fas fa-trash-alt"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch(e) { showNotify("Connection lost", "error"); }
        }

        async function triggerUpload() {
            const input = document.createElement('input');
            input.type = 'file';
            input.onchange = async () => {
                const file = input.files[0];
                if (file.size > 50 * 1024 * 1024) {
                    return showNotify("File exceeds 50MB security limit", "error");
                }

                showNotify("Encrypting & Uploading...");
                const fd = new FormData();
                fd.append('file', file);
                
                try {
                    const res = await fetch(`${WORKER_URL}/files/upload`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token },
                        body: fd
                    });
                    const data = await res.json();
                    if (data.ok) {
                        showNotify("File stored successfully");
                        refreshDash();
                    } else { showNotify(data.error, "error"); }
                } catch (e) { showNotify("Upload failed", "error"); }
            };
            input.click();
        }

        async function downloadFile(fileId, name) {
            showNotify("Requesting secure link...");
            try {
                const res = await fetch(`${WORKER_URL}/files/download?fileId=${fileId}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (data.ok && data.url) {
                    const a = document.createElement('a');
                    a.href = data.url;
                    a.download = name;
                    a.click();
                } else { showNotify("Vault access denied", "error"); }
            } catch (e) { showNotify("Download failed", "error"); }
        }

        async function deleteFile(id) {
            if(!confirm("Destroy this file permanently?")) return;
            await fetch(`${WORKER_URL}/files/delete`, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ fileRecordId: id })
            });
            refreshDash();
        }

        function logout() { localStorage.removeItem('jwork_token'); window.location.href = 'index.html'; }
        refreshDash();
    </script>
</body>
</html>
